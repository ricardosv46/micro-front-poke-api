<script>
        // Simple Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;
        
        themeToggle.addEventListener('click', () => {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                themeToggle.innerText = 'light_mode';
            } else {
                html.classList.add('dark');
                themeToggle.innerText = 'dark_mode';
            }
        });

        // Simple animation on scroll for cards
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        document.querySelectorAll('section > div').forEach(card => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            card.style.transition = 'all 0.5s ease-out';
            observer.observe(card);
        });

        // Interaction for type chips
        const chips = document.querySelectorAll('.flex.overflow-x-auto button');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chips.forEach(c => {
                    c.classList.remove('bg-primary', 'text-on-primary');
                    c.classList.add('bg-surface-container-high', 'text-on-surface');
                });
                chip.classList.add('bg-primary', 'text-on-primary');
                chip.classList.remove('bg-surface-container-high', 'text-on-surface');
            });
        });
    </script>
